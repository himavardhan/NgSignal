
<form [formGroup]="bookingForm"  (ngSubmit)="onSubmit()">
   <label for="depart"> Departure Place </label>
   <input type="text" formControlName="depart" id="depart" aria-label="Departure Place" > 
   @if((departInfo.touched || departInfo.dirty) && departInfo.invalid){
       @if(departInfo.hasError('required')) {<span> Departure is required  </span> <br>}
       @if(departInfo.hasError('minlength')){ <span> Minumium length 4   </span> <br>}
   }
   <br><br>

   <label for="arrival"> Arrival Place </label>
   <input type="text" formControlName="arrival" id="arrival" aria-label="Arrival Place" > <br><br>

   <label aria-roledescription="Please select the Trip Type" > Trip: </label>
  
   <input type="radio" formControlName="tripType" id="twoWay" name="tripType" value="Two Way" aria-label="Two Way" > 
   <label for="twoWay"> Two Way </label>

   <input type="radio" formControlName="tripType" id="oneWay" name="tripType" value="One Way" aria-label="One Way" > 
   <label for="oneWay"> One Way </label> <br><br>

   <label for="departDate"> Depart Date  </label>
   <input type="date" formControlName="departDate" id="departDate" aria-label="Departure Date" > <br><br>

   <label for="returnDate"> return Date  </label>
   <input type="date" formControlName="returnDate" id="returnDate" aria-label="Return Date" > <br><br>

   <label for="count">  Passenger count  </label>
   <input type="number" formControlName="passengerCount" id="count" aria-label=" Total number of Passengers " > <br><br>




   <div formArrayName="passengerInfo">

      @for(passenger of passengerInfo.controls;track $index){

             <div [formGroupName]="$index" style="border:1px solid gray; padding:10px; margin-bottom:10px;">
                 <h3>Passenger {{$index+1}}</h3>

               <label for="name">  Passenger Name  </label>
               <input type="text" formControlName="name" id="name" aria-label="Passenger Name" > <br><br>

               <label for="age">  Passenger Age  </label>
               <input type="number" formControlName="age" id="age" aria-label="Passenger Age" > <br><br>

             </div>

      }


   </div>



   <button type="submit" > Submit your form </button>


</form>
